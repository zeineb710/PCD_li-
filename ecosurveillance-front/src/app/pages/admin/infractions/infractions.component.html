<div class="dashboard-container">
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo.png" alt="Logo" class="sidebar-logo">
      <div class="brand-text">
        <span class="brand-eco">ECO</span>
        <span class="brand-sub">SURVEILLANCE</span>
      </div>
    </div>

    <nav class="menu">
      <a routerLink="/admin/dashboard" class="menu-item">
        <i class="fas fa-th-large"></i> Tableau de bord
      </a>
      <a routerLink="/admin/infractions" class="menu-item active">
        <i class="fas fa-minus-circle"></i> Infractions
      </a>
      <a routerLink="/admin/users" class="menu-item">
        <i class="fas fa-users"></i> Etudiants
      </a>
      <a routerLink="/admin/stats" class="menu-item">
        <i class="fas fa-chart-line"></i> Statistiques
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile-container">
        <div class="user-profile">
          <img src="assets/admin.jpg" alt="Admin" class="avatar-img">
          <div class="user-text">
            <p class="user-name">{{ currentUser?.nom }}</p>
            <p class="user-role">{{ currentUser?.role }}</p>
          </div>
        </div>

        <button class="logout-btn" (click)="onLogout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Déconnexion</span>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <h2>Infractions</h2>
      <div class="user-profile">
        <img src="assets/admin.jpg" alt="Admin" class="avatar-img">
        <div class="user-text">
          <p class="user-name">{{ currentUser?.nom }}</p>
          <p class="user-role">Admin</p>
        </div>
      </div>
    </header>

    <section class="content-area">
      <div *ngIf="loading" class="loading-state">
        <i class="fas fa-spinner fa-spin"></i> Chargement des données...
      </div>

      <div *ngIf="error" class="error-banner">
        {{ error }}
        <button (click)="loadInfractions()">Réessayer</button>
      </div>

      <app-infraction-table
        *ngIf="!loading && !error"
        [infractions]="infractions"
        [readOnly]="false"
        (edit)="editInfraction($event)"
        (delete)="deleteInfraction($event)">
      </app-infraction-table>
    </section>
  </main>
</div>
